<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter: Mobile Touch Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Mobile par double tap zoom block karne ke liye */
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(circle, #090d16 0%, #010206 100%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            max-width: 100%;
            max-height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            pointer-events: none;
            display: flex;
            gap: 15px;
            width: 95%;
            max-width: 600px;
            justify-content: space-between;
            background: rgba(0,0,0,0.6);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            z-index: 10;
        }
        .ui-stat span {
            color: #00f0ff;
        }
        #lives-display {
            color: #ff2d55 !important;
            letter-spacing: 2px;
        }
        #boss-ui {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 300px;
            display: none;
            text-align: center;
            z-index: 10;
        }
        #boss-label {
            color: #ff2d55;
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #boss-bar-bg {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #ff2d55;
        }
        #boss-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff2d55, #ff7b00);
            transition: width 0.05s ease;
        }

        /* --- TOUCH CONTROLS STYLING (MOBILE ONLY) --- */
        #touch-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 20;
            pointer-events: none;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(0, 240, 255, 0.4);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .touch-btn:active {
            background: rgba(0, 240, 255, 0.35);
            border-color: #00f0ff;
            scale: 0.95;
        }
        
        /* D-Pad (Left Side Movement) */
        #dpad {
            position: relative;
            width: 140px;
            height: 140px;
        }
        .dpad-btn {
            position: absolute;
            width: 44px;
            height: 44px;
            font-size: 18px;
            border-radius: 8px;
        }
        #btn-up    { top: 0; left: 48px; }
        #btn-down  { bottom: 0; left: 48px; }
        #btn-left  { top: 48px; left: 0; }
        #btn-right { top: 48px; right: 0; }

        /* Action Button (Right Side Shoot) */
        #btn-shoot {
            width: 76px;
            height: 76px;
            font-size: 14px;
            background: rgba(255, 45, 85, 0.2);
            border: 2px solid rgba(255, 45, 85, 0.6);
            box-shadow: 0 0 10px rgba(255, 45, 85, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            margin-right: 10px;
        }
        #btn-shoot:active {
            background: rgba(255, 45, 85, 0.6);
            border-color: #ff2d55;
        }

        /* Responsive Visibility Hiding for Desktops */
        @media (min-width: 769px) {
            #touch-controls {
                display: none; /* Hidden on Desktop PC */
            }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="ui-stat">Score: <span id="score">0</span></div>
        <div class="ui-stat">Lvl: <span id="level">1/10</span></div>
        <div class="ui-stat">Lives: <span id="lives-display">❤❤❤</span></div>
        <div class="ui-stat"><span id="kills-left">15 Left</span></div>
    </div>

    <div id="boss-ui">
        <div id="boss-label">Level 1 Boss Alert</div>
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>

    <div id="touch-controls">
        <div id="dpad">
            <div class="touch-btn dpad-btn" id="btn-up">▲</div>
            <div class="touch-btn dpad-btn" id="btn-left">◀</div>
            <div class="touch-btn dpad-btn" id="btn-right">▶</div>
            <div class="touch-btn dpad-btn" id="btn-down">▼</div>
        </div>
        <div class="touch-btn" id="btn-shoot">Fire</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const killsLeftElement = document.getElementById('kills-left');
        const livesDisplay = document.getElementById('lives-display');
        const bossUi = document.getElementById('boss-ui');
        const bossBarFill = document.getElementById('boss-bar-fill');
        const bossLabel = document.getElementById('boss-label');

        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth, 600);
            canvas.height = window.innerHeight;
            
            if (player) {
                if (player.x > canvas.width) player.x = canvas.width / 2;
                if (player.y > canvas.height) player.y = canvas.height - 160;
            }
        }
        
        let gameActive = true;
        let score = 0;
        let currentLevel = 1;
        const maxLevels = 10;
        
        let killsInThisLevel = 0;
        let killsRequiredForBoss = 15; 
        let bossActive = false;
        let bossObject = null;
        
        let screenShake = 0;
        let slowMoFactor = 1; 
        let levelTransitionActive = false;
        let levelTransitionTimer = 0;

        // Unified Input State (Both Keyboard & Touch mapping)
        const inputs = {
            left: false, right: false, up: false, down: false, shoot: false
        };

        // Keyboard Event Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') inputs.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') inputs.right = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') inputs.up = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') inputs.down = true;
            if (e.code === 'Space') inputs.shoot = true;
            
            if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
                e.preventDefault();
            }
            if (!gameActive && (e.code === 'Space' || e.code === 'Enter')) resetGame();
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') inputs.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') inputs.right = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') inputs.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') inputs.down = false;
            if (e.code === 'Space') inputs.shoot = false;
        });

        // Touch Interaction Mapping Helper function
        function bindTouchBtn(elementId, inputField) {
            const btn = document.getElementById(elementId);
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                inputs[inputField] = true;
                if (!gameActive) resetGame();
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                inputs[inputField] = false;
            });
        }

        // Bind Touch Events to DOM Elements
        bindTouchBtn('btn-up', 'up');
        bindTouchBtn('btn-down', 'down');
        bindTouchBtn('btn-left', 'left');
        bindTouchBtn('btn-right', 'right');
        bindTouchBtn('btn-shoot', 'shoot');

        // Global Tap trigger for restarting game over screen easily
        window.addEventListener('touchstart', (e) => {
            if (!gameActive) resetGame();
        });

        let lasers = [];
        let bossLasers = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        let stars = [];
        let enemySpawnTimer = 0;

        const player = {
            x: 0,
            y: 0,
            width: 32,
            height: 32,
            speed: 5.0, 
            color: '#00f0ff',
            shootCooldown: 0,
            lives: 3,
            powerUpTimer: 0, 
            init() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 180; // Elevated slightly so fingers don't block
            },
            update() {
                if (inputs.left) this.x -= this.speed;
                if (inputs.right) this.x += this.speed;
                if (inputs.up) this.y -= this.speed;
                if (inputs.down) this.y += this.speed;

                if (this.x < this.width / 2) this.x = this.width / 2;
                if (this.x > canvas.width - this.width / 2) this.x = canvas.width - this.width / 2;
                if (this.y < this.height / 2) this.y = this.height / 2;
                if (this.y > canvas.height - this.height / 2) this.y = canvas.height - this.height / 2;

                if (this.powerUpTimer > 0) this.powerUpTimer--;

                if (inputs.shoot && this.shootCooldown <= 0 && !levelTransitionActive) {
                    if (this.powerUpTimer > 0) {
                        lasers.push(new Laser(this.x, this.y - 15, 0));
                        lasers.push(new Laser(this.x, this.y - 15, -2.5));
                        lasers.push(new Laser(this.x, this.y - 15, 2.5));
                    } else {
                        lasers.push(new Laser(this.x, this.y - 15, 0));
                    }
                    this.shootCooldown = 15; 
                } else {
                    this.shootCooldown--;
                }
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.powerUpTimer > 0 ? '#ffaa00' : this.color;

                ctx.fillStyle = this.powerUpTimer > 0 ? '#ffaa00' : this.color;
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.moveTo(-5, this.height/2);
                ctx.lineTo(0, (this.height/2) + (Math.random() * 10 + 3));
                ctx.lineTo(5, this.height/2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        };

        resizeCanvas();
        player.init();
        window.addEventListener('resize', resizeCanvas);

        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.8,
                speed: Math.random() * 0.6 + 0.2
            });
        }

        class Laser {
            constructor(x, y, angleX) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 14;
                this.speedY = 10;
                this.xAngle = angleX;
            }
            update() {
                this.y -= this.speedY * slowMoFactor;
                this.x += this.xAngle * slowMoFactor;
            }
            draw() {
                ctx.save();
                ctx.fillStyle = player.powerUpTimer > 0 ? '#ffaa00' : '#00f0ff';
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.restore();
            }
        }

        class BossLaser {
            constructor(x, y, speedX = 0) {
                this.x = x;
                this.y = y;
                this.width = 5;
                this.height = 14;
                this.speedY = 4.2; 
                this.speedX = speedX;
            }
            update() {
                this.y += this.speedY * slowMoFactor;
                this.x += this.speedX * slowMoFactor;
            }
            draw() {
                ctx.save();
                ctx.fillStyle = '#ff2d55';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ff2d55';
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.restore();
            }
        }

        class PowerUp {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 20;
                this.height = 20;
                this.speed = 1.6;
            }
            update() {
                this.y += this.speed * slowMoFactor;
            }
            draw() {
                ctx.save();
                ctx.fillStyle = '#ffaa00';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ffaa00';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 10, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('P', this.x, this.y);
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.width = Math.random() * 10 + 20;
                this.height = this.width;
                this.x = Math.random() * (canvas.width - this.width) + this.width/2;
                this.y = -this.height;
                this.speed = Math.random() * 0.7 + 1.1 + (currentLevel * 0.22); 
                this.color = `hsl(${(currentLevel * 35) % 360}, 90%, 55%)`; 
            }
            update() {
                this.y += this.speed * slowMoFactor;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.height/2);
                ctx.lineTo(this.x + this.width/2, this.y);
                ctx.lineTo(this.x, this.y + this.height/2);
                ctx.lineTo(this.x - this.width/2, this.y);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        class Boss {
            constructor(level) {
                this.level = level;
                this.width = 80 + (level * 6); 
                this.height = 45 + (level * 3);
                this.x = canvas.width / 2;
                this.y = -this.height;
                this.targetY = 110; 
                this.introMode = true;
                this.maxHp = 20 + (level * 15); 
                this.hp = this.maxHp;
                this.speedX = 1.1 + (level * 0.18); 
                this.direction = 1;
                this.hue = (level * 70) % 360;
                this.fireTimer = 0;
            }
            update() {
                if (this.introMode) {
                    this.y += 1.2 * slowMoFactor;
                    if (this.y >= this.targetY) this.introMode = false;
                } else {
                    this.x += this.speedX * this.direction * slowMoFactor;
                    if (this.x + this.width/2 >= canvas.width || this.x - this.width/2 <= 0) {
                        this.direction *= -1;
                    }

                    this.fireTimer++;
                    let attackRate = Math.max(35, 80 - (this.level * 4));
                    if (this.fireTimer >= attackRate) {
                        this.fireTimer = 0;
                        if (this.level >= 4) {
                            bossLasers.push(new BossLaser(this.x - 18, this.y + this.height/2));
                            bossLasers.push(new BossLaser(this.x + 18, this.y + this.height/2));
                        } else {
                            bossLasers.push(new BossLaser(this.x, this.y + this.height/2));
                        }
                    }
                }
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 41%)`;

                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.height/2); 
                ctx.lineTo(this.x + this.width/2, this.y - this.height/4); 
                ctx.lineTo(this.x + this.width/3, this.y - this.height/2); 
                ctx.lineTo(this.x - this.width/3, this.y - this.height/2); 
                ctx.lineTo(this.x - this.width/2, this.y - this.height/4); 
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, speedMultiplier = 1) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 6 * speedMultiplier;
                this.speedY = (Math.random() - 0.5) * 6 * speedMultiplier;
                this.alpha = 1;
                this.decay = Math.random() * 0.016 + 0.012;
            }
            update() {
                this.x += this.speedX * slowMoFactor;
                this.y += this.speedY * slowMoFactor;
                this.alpha -= this.decay * (slowMoFactor === 1 ? 1 : 0.4);
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerExplosion(x, y, color, count = 12, speed = 1) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, speed));
            }
        }

        function triggerBossDeathAnimation(boss) {
            screenShake = 20; 
            slowMoFactor = 0.15; 
            bossUi.style.display = 'none';

            let explosionRepetitions = 0;
            let interval = setInterval(() => {
                if (!gameActive) { clearInterval(interval); return; }
                
                let rx = boss.x + (Math.random() - 0.5) * boss.width;
                let ry = boss.y + (Math.random() - 0.5) * boss.height;
                
                triggerExplosion(rx, ry, `hsl(${boss.hue}, 100%, 60%)`, 15, 1.8);
                triggerExplosion(rx, ry, '#ffffff', 6, 1.3);
                screenShake = 10;

                explosionRepetitions++;
                if (explosionRepetitions > 7) {
                    clearInterval(interval);
                    
                    triggerExplosion(boss.x, boss.y, '#ffffff', 60, 3.2);
                    triggerExplosion(boss.x, boss.y, '#ffaa00', 30, 2.2);
                    
                    slowMoFactor = 1;
                    bossActive = false;
                    bossObject = null;
                    
                    if (currentLevel < maxLevels) {
                        goToNextLevel();
                    } else {
                        triggerVictory();
                    }
                }
            }, 120); 
        }

        function goToNextLevel() {
            currentLevel++;
            killsInThisLevel = 0;
            killsRequiredForBoss = 15 + (currentLevel * 3); 
            levelTransitionActive = true;
            levelTransitionTimer = 120; 
            enemies = [];
            lasers = [];
            bossLasers = [];
            powerups = [];
        }

        function triggerVictory() {
            gameActive = false;
            setTimeout(() => {
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00f0ff';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GALAXY SAVED!', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '16px sans-serif';
                ctx.fillText(`Final Score: ${score} | All Bosses Beat!`, canvas.width / 2, canvas.height / 2 + 30);
                ctx.font = '12px sans-serif';
                ctx.fillText('Tap anywhere to play again', canvas.width / 2, canvas.height / 2 + 80);
            }, 500);
        }

        function checkCollision(obj1, obj2) {
            return (
                obj1.x - obj1.width/2 < obj2.x + obj2.width/2 &&
                obj1.x + obj1.width/2 > obj2.x - obj2.width/2 &&
                obj1.y - obj1.height/2 < obj2.y + obj2.height/2 &&
                obj1.y + obj1.height/2 > obj2.y - obj2.height/2
            );
        }

        function handlePlayerDamage() {
            player.lives--;
            screenShake = 18;
            triggerExplosion(player.x, player.y, '#ff0055', 18, 1.4);
            
            let heartString = "";
            for(let i=0; i<player.lives; i++) heartString += "❤";
            livesDisplay.innerText = heartString || "NONE";

            if (player.lives <= 0) {
                gameActive = false;
            }
        }

        function resetGame() {
            score = 0;
            currentLevel = 1;
            killsInThisLevel = 0;
            killsRequiredForBoss = 15;
            bossActive = false;
            bossObject = null;
            slowMoFactor = 1;
            levelTransitionActive = false;
            lasers = [];
            bossLasers = [];
            enemies = [];
            particles = [];
            powerups = [];
            
            player.init();
            player.lives = 3;
            player.powerUpTimer = 0;
            
            // Clean inputs trigger state
            for(let key in inputs) inputs[key] = false;

            scoreElement.innerText = score;
            levelElement.innerText = `${currentLevel}/${maxLevels}`;
            killsLeftElement.innerText = `${killsRequiredForBoss} Left`;
            livesDisplay.innerText = "❤❤校";
            bossUi.style.display = 'none';
            
            gameActive = true;
            animate();
        }

        // MASTER LOOP
        function animate() {
            if (!gameActive) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff2d55';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '15px sans-serif';
                ctx.fillText('Tap anywhere to try again', canvas.width / 2, canvas.height / 2 + 20);
                return;
            }

            requestAnimationFrame(animate);

            ctx.save();
            if (screenShake > 0) {
                let dx = (Math.random() - 0.5) * screenShake;
                let dy = (Math.random() - 0.5) * screenShake;
                ctx.translate(dx, dy);
                screenShake *= 0.85;
                if (screenShake < 0.5) screenShake = 0;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.y += star.speed * slowMoFactor;
                if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            levelElement.innerText = `${currentLevel}/${maxLevels}`;
            if (!bossActive) {
                let left = killsRequiredForBoss - killsInThisLevel;
                killsLeftElement.innerText = `${left} Left`;
            } else {
                killsLeftElement.innerText = "BOSS FIGHT";
            }

            if (levelTransitionActive) {
                levelTransitionTimer--;
                ctx.fillStyle = 'rgba(0, 240, 255, 0.9)';
                ctx.font = 'italic bold 26px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`LEVEL ${currentLevel}`, canvas.width/2, canvas.height/2);
                if (levelTransitionTimer <= 0) levelTransitionActive = false;
            }

            player.update();
            player.draw();

            for (let l = lasers.length - 1; l >= 0; l--) {
                lasers[l].update();
                lasers[l].draw();
                if (lasers[l].y < 0 || lasers[l].x < 0 || lasers[l].x > canvas.width) {
                    lasers.splice(l, 1);
                }
            }

            const pRect = { x: player.x, y: player.y, width: player.width, height: player.height };
            for (let bl = bossLasers.length - 1; bl >= 0; bl--) {
                bossLasers[bl].update();
                bossLasers[bl].draw();

                if (checkCollision(pRect, bossLasers[bl])) {
                    bossLasers.splice(bl, 1);
                    handlePlayerDamage();
                    continue;
                }
                
                if (bossLasers[bl] && bossLasers[bl].y > canvas.height) {
                    bossLasers.splice(bl, 1);
                }
            }

            for (let pu = powerups.length - 1; pu >= 0; pu--) {
                powerups[pu].update();
                powerups[pu].draw();

                if (checkCollision(pRect, powerups[pu])) {
                    powerups.splice(pu, 1);
                    player.powerUpTimer = 450; 
                    score += 50;
                    scoreElement.innerText = score;
                    continue;
                }

                if (powerups[pu].y > canvas.height) {
                    powerups.splice(pu, 1);
                }
            }

            if (!bossActive && !levelTransitionActive) {
                if (killsInThisLevel >= killsRequiredForBoss) {
                    bossActive = true;
                    bossObject = new Boss(currentLevel);
                    bossUi.style.display = 'block';
                    bossLabel.innerText = `LEVEL ${currentLevel} BOSS`;
                    bossBarFill.style.width = '100%';
                } else {
                    enemySpawnTimer++;
                    let targetInterval = Math.max(30, 65 - (currentLevel * 3.5)); 
                    if (enemySpawnTimer >= targetInterval) {
                        enemies.push(new Enemy());
                        enemySpawnTimer = 0;
                    }
                }
            }

            for (let e = enemies.length - 1; e >= 0; e--) {
                enemies[e].update();
                enemies[e].draw();

                if (checkCollision(pRect, enemies[e])) {
                    triggerExplosion(enemies[e].x, enemies[e].y, enemies[e].color, 10);
                    enemies.splice(e, 1);
                    handlePlayerDamage();
                    continue;
                }

                for (let l = lasers.length - 1; l >= 0; l--) {
                    if (enemies[e] && checkCollision(lasers[l], enemies[e])) {
                        triggerExplosion(enemies[e].x, enemies[e].y, enemies[e].color, 8);
                        
                        if (Math.random() < 0.22) { 
                            powerups.push(new PowerUp(enemies[e].x, enemies[e].y));
                        }

                        enemies.splice(e, 1);
                        lasers.splice(l, 1);
                        score += 10;
                        killsInThisLevel++;
                        scoreElement.innerText = score;
                        break;
                    }
                }

                if (enemies[e] && enemies[e].y > canvas.height) {
                    enemies.splice(e, 1);
                }
            }

            if (bossActive && bossObject) {
                bossObject.update();
                bossObject.draw();

                if (!bossObject.introMode && checkCollision(pRect, bossObject)) {
                    handlePlayerDamage();
                }

                for (let l = lasers.length - 1; l >= 0; l--) {
                    if (checkCollision(lasers[l], bossObject)) {
                        lasers.splice(l, 1);
                        
                        if (!bossObject.introMode && slowMoFactor === 1) { 
                            bossObject.hp--;
                            score += 5;
                            scoreElement.innerText = score;
                            screenShake = 3; 
                            
                            triggerExplosion(lasers[l] ? lasers[l].x : bossObject.x, bossObject.y + bossObject.height/2, '#ffffff', 2);

                            let hpPercent = (bossObject.hp / bossObject.maxHp) * 100;
                            bossBarFill.style.width = `${hpPercent}%`;

                            if (bossObject.hp <= 0) {
                                triggerBossDeathAnimation(bossObject);
                            }
                        }
                    }
                }
            }

            for (let p = particles.length - 1; p >= 0; p--) {
                particles[p].update();
                particles[p].draw();
                if (particles[p].alpha <= 0) particles.splice(p, 1);
            }

            ctx.restore(); 
        }

        animate();
    </script>
</body>
</html>
